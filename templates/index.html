<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Web(TEMPESTSTUDIO)</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 10px;
            font-size: 16px;
            resize: vertical;
        }

        .banner-group {
            margin: 20px 0;
        }

        .banner-group label {
            margin-right: 20px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .error {
            margin-top: 20px;
            color: red;
            font-weight: bold;
        }

        .result {
            margin-top: 30px;
        }

        pre {
            background: #eeeeee;
            padding: 15px;
            overflow-x: auto;
            white-space: pre;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>ASCII Art Web(TEMPESTSTUDIO)</h1>

    <form action="/ascii-art" method="POST">

        <label for="text"><strong>Enter Text</strong></label>

        <br><br>

        <textarea
            id="text"
            name="text"
            placeholder="Type your text here...">{{.Text}}</textarea>

        <div class="banner-group">

            <strong>Select Banner</strong>

            <br><br>

            <label>
                <input
                    type="radio"
                    name="banner"
                    value="standard"
                    {{if eq .Banner "standard"}}checked{{end}}>
                Standard
            </label>

            <label>
                <input
                    type="radio"
                    name="banner"
                    value="shadow"
                    {{if eq .Banner "shadow"}}checked{{end}}>
                Shadow
            </label>

            <label>
                <input
                    type="radio"
                    name="banner"
                    value="thinkertoy"
                    {{if eq .Banner "thinkertoy"}}checked{{end}}>
                Thinkertoy
            </label>

        </div>

        <button type="submit">
            Generate ASCII Art
        </button>

    </form>

    {{if .Error}}

    <div class="error">
        {{.Error}}
    </div>

    {{end}}

    {{if .Result}}

    <div class="result">

        <h2>ASCII Art Result(TEMPESTSTUDIO)</h2>

        <pre>{{.Result}}</pre>

    </div>

    {{end}}

</div>

</body>

</html>
